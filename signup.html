<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="description" content="Create your Jutis wallet account. Join the Canton ecosystem and start managing your digital assets securely."/>
<meta name="robots" content="noindex"/>
<link rel="canonical" href="https://jutis.xyz/signup.html"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://jutis.xyz/signup.html"/>
<meta property="og:title" content="Sign Up - Jutis"/>
<meta property="og:description" content="Create your Jutis wallet account. Join the Canton ecosystem and start managing your digital assets securely."/>
<meta property="og:image" content="https://jutis.xyz/og-image.svg"/>
<meta property="og:site_name" content="Jutis"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:site" content="@jutiswallet"/>
<meta name="twitter:title" content="Sign Up - Jutis"/>
<meta name="twitter:description" content="Create your Jutis wallet account. Join the Canton ecosystem and start managing your digital assets securely."/>
<meta name="twitter:image" content="https://jutis.xyz/og-image.svg"/>
<title>Sign Up - Jutis</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "bg-main": "#1a1d23",
                "card-bg": "#232730",
                "border-color": "#2e323c",
                "text-primary": "#e6e8ec",
                "text-secondary": "#9aa1ac",
                "accent": "#dce87a",
            },
            fontFamily: {
                "sans": ["Inter", "system-ui"],
                "display": ["Plus Jakarta Sans", "Inter"]
            }
        },
    },
}
</script>
<style>
body { background-color: #1a1d23; color: #e6e8ec; font-family: "Inter", system-ui; }
.network-grid { background-image: radial-gradient(#2e323c 1px, transparent 1px); background-size: 40px 40px; }
.abstract-shape { position: absolute; border: 1px solid #2e323c; opacity: 0.2; pointer-events: none; }
.shape-1 { width: 40vw; max-width: 400px; height: 40vw; max-height: 400px; transform: rotate(15deg); border-radius: 40px; top: -10%; right: -5%; }
.shape-2 { width: 30vw; max-width: 300px; height: 30vw; max-height: 300px; transform: rotate(-12deg); border-color: #dce87a; opacity: 0.1; bottom: 15%; left: 5%; }
.shape-3 { width: 60vw; max-width: 600px; height: 60vw; max-height: 600px; transform: rotate(45deg); border-radius: 100px; top: 20%; left: -10%; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center relative overflow-x-hidden pt-32">
<div class="fixed inset-0 network-grid opacity-30"></div>
<div class="abstract-shape shape-1"></div>
<div class="abstract-shape shape-2"></div>
<div class="abstract-shape shape-3"></div>
<div class="fixed top-[-10%] right-[-10%] w-[80vw] max-w-[600px] h-[80vw] max-h-[600px] bg-[#dce87a]/5 rounded-full blur-[140px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[80vw] max-w-[600px] h-[80vw] max-h-[600px] bg-white/5 rounded-full blur-[140px] pointer-events-none"></div>

<!-- Header -->
<header class="fixed top-0 left-0 w-full z-50 px-6 py-4">
    <nav class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="relative w-10 h-10 flex items-center justify-center">
                <div class="absolute inset-0 border-2 border-[#dce87a] rounded-xl rotate-45 scale-90 group-hover:rotate-45 group-hover:scale-100 transition-all duration-300"></div>
                <div class="absolute inset-0 border-2 border-[#e6e8ec]/20 rounded-xl rotate-12"></div>
                <div class="w-1.5 h-5 bg-[#dce87a] rounded-full"></div>
            </div>
            <span class="text-xl font-display font-bold tracking-[0.2em] uppercase">Jutis</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
            <a href="feature.html" class="text-sm font-medium text-[#9aa1ac] hover:text-[#e6e8ec] transition-colors">Feature</a>
            <a href="developers.html" class="text-sm font-medium text-[#9aa1ac] hover:text-[#e6e8ec] transition-colors">Developers</a>
            <a href="docs.html" class="text-sm font-medium text-[#9aa1ac] hover:text-[#e6e8ec] transition-colors">Docs</a>
            <a href="security.html" class="text-sm font-medium text-[#9aa1ac] hover:text-[#e6e8ec] transition-colors">Security</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="login.html" class="text-sm font-medium text-[#9aa1ac] hover:text-[#e6e8ec] transition-colors">Login</a>
            <a href="signup.html" class="px-4 py-2 bg-[#dce87a] text-[#1a1d23] rounded-full text-sm font-bold">Sign Up</a>
        </div>
    </nav>
</header>

<main class="relative z-10 w-full max-w-md px-6">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-display font-bold tracking-tight mb-2">Create Account</h1>
        <p class="text-[#9aa1ac]">Start securing your Canton assets</p>
    </div>

    <form class="bg-[#232730] border border-[#2e323c] rounded-2xl p-8 space-y-6">
        <div>
            <label class="block text-sm font-medium mb-2">Full Name</label>
            <input type="text" placeholder="John Doe" class="w-full px-4 py-3 bg-[#1a1d23] border border-[#2e323c] rounded-xl text-[#e6e8ec] placeholder-[#9aa1ac] focus:outline-none focus:border-[#dce87a]/50 transition-colors"/>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Email</label>
            <input type="email" placeholder="you@example.com" class="w-full px-4 py-3 bg-[#1a1d23] border border-[#2e323c] rounded-xl text-[#e6e8ec] placeholder-[#9aa1ac] focus:outline-none focus:border-[#dce87a]/50 transition-colors"/>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Password</label>
            <input type="password" placeholder="Create a strong password" class="w-full px-4 py-3 bg-[#1a1d23] border border-[#2e323c] rounded-xl text-[#e6e8ec] placeholder-[#9aa1ac] focus:outline-none focus:border-[#dce87a]/50 transition-colors"/>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Confirm Password</label>
            <input type="password" placeholder="Confirm your password" class="w-full px-4 py-3 bg-[#1a1d23] border border-[#2e323c] rounded-xl text-[#e6e8ec] placeholder-[#9aa1ac] focus:outline-none focus:border-[#dce87a]/50 transition-colors"/>
        </div>

        <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 mt-1 rounded border-[#2e323c] bg-[#1a1d23] accent-[#dce87a]"/>
            <span class="text-sm text-[#9aa1ac]">I agree to the <a href="#" class="text-[#dce87a] hover:underline">Terms of Service</a> and <a href="#" class="text-[#dce87a] hover:underline">Privacy Policy</a></span>
        </label>

        <button type="submit" class="w-full py-3 bg-[#dce87a] text-[#1a1d23] rounded-xl font-bold hover:bg-[#e6e8ec] transition-colors">
            Create Account
        </button>

        <div class="relative flex items-center justify-center">
            <div class="w-full h-px bg-[#2e323c]"></div>
            <span class="absolute px-4 bg-[#232730] text-[#9aa1ac] text-sm">or sign up with</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button type="button" class="flex items-center justify-center gap-2 py-3 border border-[#2e323c] rounded-xl hover:border-[#dce87a]/30 transition-colors">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span class="text-sm font-medium">Google</span>
            </button>
            <button type="button" class="flex items-center justify-center gap-2 py-3 border border-[#2e323c] rounded-xl hover:border-[#dce87a]/30 transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                <span class="text-sm font-medium">GitHub</span>
            </button>
        </div>
    </form>

    <p class="text-center mt-6 text-sm text-[#9aa1ac]">
        Already have an account? <a href="login.html" class="text-[#dce87a] font-medium hover:underline">Sign in</a>
    </p>
</main>

<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#dce87a]/20 to-transparent"></div>
</body>
</html>
